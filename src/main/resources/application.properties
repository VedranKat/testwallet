spring.application.name=eudi-pid-qr-generator
server.port=${PORT:${SERVER_PORT:8080}}

app.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:${server.port}}
app.client-id=${APP_CLIENT_ID:demo-eudi-pid-verifier}
app.client-id-scheme=${APP_CLIENT_ID_SCHEME:x509_san_dns}
app.qr-uri-mode=${APP_QR_URI_MODE:openid4vp}
app.certificate-output-dir=${APP_CERTIFICATE_OUTPUT_DIR:certs}
app.root-ca-pem=${APP_ROOT_CA_PEM:}
app.root-ca-key-pem=${APP_ROOT_CA_KEY_PEM:}
app.client-cert-pem=${APP_CLIENT_CERT_PEM:}
app.client-key-pem=${APP_CLIENT_KEY_PEM:}
app.include-nationality=${APP_INCLUDE_NATIONALITY:true}
app.request-ttl-seconds=${APP_REQUEST_TTL_SECONDS:300}

spring.thymeleaf.cache=false
